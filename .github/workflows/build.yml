name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'linux'
          target: 'desktop'
          modules: 'qtquick qtqml'

      - name: Install GStreamer dev packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-qt6 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-libav \
            libspdlog-dev \
            libgtest-dev \
            libgmock-dev \
            ninja-build

      - name: Configure
        run: cmake --preset linux-debug

      - name: Build
        run: cmake --build build/linux-debug

      - name: Test
        run: ctest --test-dir build/linux-debug --output-on-failure
